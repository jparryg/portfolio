<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Créditos fotográficos · La ReContra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" />
  <link rel="stylesheet" href="styles.css?v=20260518" />
  <style>
    .credits-page { padding: calc(var(--nav-h) + 3rem) 0 5rem; min-height: 100vh; }
    .credits-back { display: inline-flex; align-items: center; gap: .5rem; color: var(--cream-3); font-size: .875rem; margin-bottom: 2rem; transition: color .18s; }
    .credits-back:hover { color: var(--cream); }
    .credits-page h1 { font-family: var(--display); font-size: clamp(2rem, 5vw, 3.5rem); letter-spacing: .04em; color: var(--cream); margin-bottom: .5rem; }
    .credits-page .lead { color: var(--cream-3); margin-bottom: 2.5rem; }
    .credits-list { list-style: none; display: flex; flex-direction: column; gap: 1.5rem; }
    .credits-list li { background: var(--bg-3); border: 1px solid var(--line); border-radius: var(--radius); padding: 1.25rem 1.5rem; }
    .credits-list li strong { display: block; color: var(--cream); margin-bottom: .35rem; }
    .credits-list li span { font-size: .875rem; color: var(--cream-3); }
    .credits-list a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
  </style>
</head>
<body>
  <nav class="nav is-scrolled" id="nav">
    <div class="nav-inner container">
      <a class="nav-logo" href="index.html" aria-label="La ReContra — inicio">
        <span class="nav-logo-text">La<em>Re</em>Contra</span>
      </a>
    </div>
  </nav>

  <main class="credits-page">
    <div class="container">
      <a class="credits-back" href="index.html">← Volver al inicio</a>
      <h1>Créditos fotográficos</h1>
      <p class="lead">
        Las imágenes utilizadas en este sitio están bajo licencias Creative Commons vía
        <a href="https://openverse.org" target="_blank" rel="noopener">Openverse</a>.
      </p>
      <ul class="credits-list" data-credits>
        <li><em>Cargando créditos...</em></li>
      </ul>
    </div>
  </main>

  <script>
  (function () {
    fetch("assets/credits.json")
      .then(function (r) { return r.json(); })
      .then(function (credits) {
        var list = document.querySelector("[data-credits]");
        if (!list) return;
        var entries = Array.isArray(credits) ? credits : Object.values(credits);
        list.innerHTML = entries.map(function (c) {
          return '<li>' +
            '<strong>' + (c.title || c.id || "Imagen") + '</strong>' +
            '<span>' +
              'por ' + (c.creator_url
                ? '<a href="' + c.creator_url + '" target="_blank" rel="noopener">' + c.creator + '</a>'
                : (c.creator || "Desconocido")) +
              ' (' + (c.source || "Openverse") + ') · ' +
              '<a href="' + (c.license_url || "#") + '" target="_blank" rel="noopener">' +
                (c.license || "CC").toUpperCase() + ' ' + (c.license_version || "") +
              '</a> · ' +
              '<a href="' + (c.foreign_landing_url || "#") + '" target="_blank" rel="noopener">Ver original ↗</a>' +
            '</span>' +
          '</li>';
        }).join("");
      })
      .catch(function () {
        var list = document.querySelector("[data-credits]");
        if (list) list.innerHTML = "<li>No se pudieron cargar los créditos.</li>";
      });
  })();
  </script>
</body>
</html>
